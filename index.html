<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DptoLibre | Tu Pasaporte de Inquilino</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white font-sans antialiased">

    <header class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
        <h1 class="text-5xl font-bold mb-6">Tu Pasaporte de Inquilino</h1>
        <p class="text-xl text-gray-400 mb-10 max-w-2xl">Alquila más rápido, seguro y gana intereses. Tu historial es tu mayor activo.</p>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 max-w-5xl mb-12">
            <div class="p-6 border border-gray-800 rounded-xl bg-gray-900">
                <h3 class="text-emerald-400 font-bold mb-2">1. Verifica</h3>
                <p class="text-sm">Solvencia instantánea y alquileres blindados.</p>
            </div>
            <div class="p-6 border border-gray-800 rounded-xl bg-gray-900">
                <h3 class="text-emerald-400 font-bold mb-2">2. Suma Puntos</h3>
                <p class="text-sm">Pago puntual = Beneficios y artículos exclusivos.</p>
            </div>
            <div class="p-6 border border-gray-800 rounded-xl bg-gray-900">
                <h3 class="text-emerald-400 font-bold mb-2">3. Score</h3>
                <p class="text-sm">Construye tu historial para tu futura casa.</p>
            </div>
        </div>

        <button class="bg-emerald-600 hover:bg-emerald-500 px-10 py-4 rounded-full font-bold text-lg transition">
            Comenzar Mi Verificación
        </button>
    </header>

</body>
</html>
